name: Sync Free Basic Football Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  sync-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Call backend sync endpoint
        env:
          SYNC_BASE_URL: ${{ secrets.BACKEND_SYNC_URL }}
        run: |
          if [ -z "$SYNC_BASE_URL" ]; then
            echo "Missing BACKEND_SYNC_URL repository secret"
            exit 1
          fi

          echo "Calling backend sync endpoint..."
          response=$(curl --fail --silent --show-error --request POST "$SYNC_BASE_URL/api/sync")
          echo "$response"
          echo "Backend basic cache sync completed"

          {
            echo "# Sync Free Basic Football Data"
            echo ""
            echo "Endpoint called: \`$SYNC_BASE_URL/api/sync\`"
            echo ""
            echo "## Response"
            echo ""
            echo '```json'
            echo "$response"
            echo '```'
            echo ""
            echo "Este workflow sincroniza datos basicos gratuitos: partidos, resultados, clasificacion, goleadores basicos y equipos. Las metricas avanzadas se cargan con el workflow \`Add manual advanced stats\`."
          } >> "$GITHUB_STEP_SUMMARY"
