name: Update player stats CSV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install requests pandas
      - run: python backend/scripts/scrape_sofascore.py --all-played
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/*.csv backend/logs/*.log
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Actualiza estadísticas de jugadores" && git push; fi
