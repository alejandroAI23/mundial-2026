services:
  - type: web
    name: mundial-2026-ai-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AUTO_SYNC_ON_STARTUP
        value: "true"
      - key: CORS_ORIGINS
        value: "https://alejandroai23.github.io"
