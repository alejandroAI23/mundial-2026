name: Add manual advanced stats

on:
  workflow_dispatch:
    inputs:
      partido_id:
        description: "ID interno. Ejemplo: SWE-TUN-2026"
        required: true
        type: string
      match_id:
        description: "ID SofaScore o ID interno del partido"
        required: true
        type: string
      fecha:
        description: "Fecha YYYY-MM-DD"
        required: true
        type: string
      local:
        description: "Equipo local en ingles. Ejemplo: Sweden"
        required: true
        type: string
      visitante:
        description: "Equipo visitante en ingles. Ejemplo: Tunisia"
        required: true
        type: string
      jugador:
        description: "Nombre del jugador"
        required: true
        type: string
      pais:
        description: "Seleccion del jugador en ingles"
        required: true
        type: string
      rival:
        description: "Seleccion rival en ingles"
        required: true
        type: string
      stats_json:
        description: "JSON de stats. Ver docs/GUIA_ACTION_MANUAL_STATS.md"
        required: true
        type: string

permissions:
  contents: write

jobs:
  add-manual-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Add manual advanced stats to CSV
        run: |
          python backend/scripts/add_manual_stats.py \
            --partido-id "${{ inputs.partido_id }}" \
            --match-id "${{ inputs.match_id }}" \
            --fecha "${{ inputs.fecha }}" \
            --local "${{ inputs.local }}" \
            --visitante "${{ inputs.visitante }}" \
            --jugador "${{ inputs.jugador }}" \
            --pais "${{ inputs.pais }}" \
            --rival "${{ inputs.rival }}" \
            --stats-json '${{ inputs.stats_json }}'

      - name: Build summary
        if: always()
        run: |
          python - <<'PY'
          import csv
          import os
          from pathlib import Path

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          data_dir = Path("backend/data")
          files = ["jugadores_stats.csv", "disciplina.csv", "porteros_stats.csv", "partidos_motm.csv"]
          lines = ["# Carga manual de estadisticas avanzadas", ""]
          lines.append("## Jugador cargado")
          lines.append("")
          lines.append(f"- Partido: `${{ inputs.partido_id }}`")
          lines.append(f"- Match ID: `${{ inputs.match_id }}`")
          lines.append(f"- Jugador: `${{ inputs.jugador }}`")
          lines.append(f"- Pais: `${{ inputs.pais }}`")
          lines.append("")
          lines.append("## Estado CSV")
          lines.append("")
          lines.append("| Archivo | Filas totales | Filas reales | Filas ejemplo |")
          lines.append("|---|---:|---:|---:|")
          for name in files:
              path = data_dir / name
              if not path.exists():
                  lines.append(f"| `{name}` | 0 | 0 | 0 |")
                  continue
              with path.open("r", encoding="utf-8", newline="") as fh:
                  rows = list(csv.DictReader(fh))
              examples = sum(1 for row in rows if str(row.get("es_ejemplo", "")).lower() == "true")
              lines.append(f"| `{name}` | {len(rows)} | {len(rows) - examples} | {examples} |")
          summary.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print("\n".join(lines))
          PY

      - name: Commit CSV changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/jugadores_stats.csv backend/data/disciplina.csv backend/data/porteros_stats.csv backend/data/partidos_motm.csv
          if git diff --cached --quiet; then
            echo "No CSV changes to commit"
          else
            git commit -m "Añade estadística avanzada manual"
            git push
          fi
